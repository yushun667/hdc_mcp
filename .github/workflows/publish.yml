name: 发布到 PyPI

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: 构建发行包
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装 uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: 构建包
        run: uv build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: 发布到 PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/hdc-mcp
    permissions:
      id-token: write  # 使用 OIDC 免密发布

    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: 发布到 PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
